  </defs>

  <!-- outer coin -->
  <circle cx="48" cy="48" r="44" fill="url(#rimFill)" />
  <circle cx="48" cy="48" r="39.5" fill="none" stroke="#6A2C00" stroke-width="4.5"/>
  <circle cx="48" cy="48" r="33.5" fill="url(#goldFill)" />

  <!-- exclamation -->
  <rect x="41" y="18" width="14" height="42" rx="6.5" fill="#6E2900"/>
  <circle cx="48" cy="71" r="6.5" fill="#6E2900"/>
